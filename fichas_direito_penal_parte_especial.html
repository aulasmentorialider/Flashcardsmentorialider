<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas — Direito Penal: Parte Especial | CFO PMMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1F3864;
    --navy-mid: #2E5FA3;
    --navy-light: #dce8f8;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --bg: #f4f6fb;
    --surface: #ffffff;
    --border: rgba(31,56,100,0.12);
    --text: #1a1f2e;
    --muted: #5a6580;
    --faint: #9ba4bc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--navy); padding: 1.5rem 2rem 1.25rem; display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap; }
  .header-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; margin-bottom: 4px; }
  header h1 { font-size: 20px; font-weight: 600; color: #fff; line-height: 1.2; }
  header p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }
  .header-info { flex: 1; }
  .card-count-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); align-self: flex-start; margin-top: 4px; }

  /* FILTER TABS */
  .filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--navy-mid); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .filter-btn.pessoa.active { background: #534AB7; border-color: #534AB7; }
  .filter-btn.patrimonio.active { background: #0F6E56; border-color: #0F6E56; }

  main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .progress-wrap { height: 3px; background: var(--border); border-radius: 999px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--navy-mid); border-radius: 999px; transition: width 0.3s ease; }

  .topic-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.75rem; align-items: center; }
  .topic-btn { font-family: 'Sora', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .topic-btn:hover { border-color: var(--navy-mid); color: var(--navy); }
  .topic-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .counter-pill { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); white-space: nowrap; }

  .card-scene { perspective: 1200px; margin-bottom: 1.5rem; }
  .card-inner { position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1); min-height: 290px; }
  .card-inner.flipped { transform: rotateY(180deg); }

  .face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem 2rem; display: flex; flex-direction: column; }
  .face.back { transform: rotateY(180deg); position: absolute; top: 0; left: 0; right: 0; }

  .f-cat { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; padding: 3px 10px; border-radius: 4px; display: inline-block; margin-bottom: 1.1rem; width: fit-content; }
  .cat-navy   { background: var(--navy-light); color: var(--navy); }
  .cat-teal   { background: var(--teal-light); color: var(--teal); }
  .cat-coral  { background: var(--coral-light); color: var(--coral); }
  .cat-amber  { background: var(--amber-light); color: var(--amber); }
  .cat-purple { background: var(--purple-light); color: var(--purple); }

  .f-title { font-size: 21px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 0.6rem; }
  .f-question { font-size: 14px; color: var(--muted); line-height: 1.65; margin-bottom: 1.25rem; flex: 1; }
  .f-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .pill { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 9px; border-radius: 4px; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .hint-line { font-size: 11.5px; color: var(--faint); display: flex; align-items: center; gap: 6px; margin-bottom: 1.25rem; }

  .b-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 1.1rem; }
  .b-block { background: var(--bg); border-radius: 10px; padding: 11px 15px; margin-bottom: 9px; }
  .b-block .blbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 5px; }
  .b-block p { font-size: 13px; color: var(--text); line-height: 1.65; }
  .b-alert { border-left: 3px solid var(--coral); background: var(--coral-light); border-radius: 0 10px 10px 0; padding: 11px 15px; margin-bottom: 9px; }
  .b-alert .blbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--coral); margin-bottom: 5px; }
  .b-alert p { font-size: 13px; color: #5a2010; line-height: 1.65; }
  .b-tip { border-left: 3px solid var(--teal); background: var(--teal-light); border-radius: 0 10px 10px 0; padding: 11px 15px; margin-bottom: 9px; }
  .b-tip .blbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--teal); margin-bottom: 5px; }
  .b-tip p { font-size: 13px; color: #0a3d2e; line-height: 1.65; }

  .btn-row { display: flex; gap: 8px; margin-top: 1.4rem; }
  .btn { flex: 1; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: var(--bg); color: var(--text); }
  .btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .btn-primary:hover { background: #17316b; color: #fff; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--faint); font-size: 14px; }

  footer { text-align: center; padding: 2rem 1rem; font-size: 11.5px; color: var(--faint); border-top: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; }

  @media (max-width: 540px) {
    main { padding: 1.25rem 1rem 3rem; }
    header { padding: 1.25rem 1rem; }
    .filter-bar { padding: 0.75rem 1rem; }
    .f-title { font-size: 18px; }
    .face { padding: 1.25rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-info">
    <div class="header-badge">CFO PMMG · Direito Penal · Parte Especial</div>
    <h1>Crimes contra a pessoa e o patrimônio</h1>
    <p>Fichas temáticas para revisão e estudo ativo</p>
  </div>
  <div class="card-count-badge" id="hdr-count"></div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all')">Todas as fichas</button>
  <button class="filter-btn pessoa" onclick="setFilter('pessoa')">Crimes contra a pessoa</button>

</div>

<main>
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
  <div class="topic-nav" id="topic-nav"></div>
  <div class="card-scene">
    <div class="card-inner" id="card">
      <div class="face front" id="front">
        <div id="f-cat" class="f-cat cat-purple"></div>

        <div id="f-question" class="f-question"></div>
        <div id="f-pills" class="f-pills"></div>
        <div class="hint-line">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Tente responder mentalmente antes de revelar
        </div>
        <div class="btn-row">
          <button class="btn" onclick="prev()">← anterior</button>
          <button class="btn btn-primary" onclick="flip()">ver resposta ↓</button>
          <button class="btn" onclick="next()">próxima →</button>
        </div>
      </div>
      <div class="face back" id="back">
        <div id="b-cat" class="f-cat cat-purple"></div>
        <div id="b-title" class="b-title"></div>
        <div id="b-blocks"></div>
        <div class="btn-row">
          <button class="btn" onclick="prev()">← anterior</button>
          <button class="btn btn-primary" onclick="flip()">↑ ocultar</button>
          <button class="btn" onclick="next()">próxima →</button>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" id="empty" style="display:none">Nenhuma ficha nesta categoria.</div>
</main>

<footer>Mentoria Líder · CFO PMMG · Material de uso exclusivo dos alunos</footer>

<script>

  {
    grupo: "pessoa", cat: "Crimes contra a pessoa", catClass: "cat-purple",

    question: "Quais as qualificadoras do homicídio doloso (art. 121 CP)? É possível homicídio qualificado-privilegiado?",

    dica: "Macete qualificadoras: MOTIVO (torpe/fútil) + MEIO (cruel, veneno, fogo...) + MODO (traição, emboscada) + CONEXÃO (para assegurar outro crime) + FEMINICÍDIO + AGENTE DE SEGURANÇA. Subjetivas: motivo e conexão. Objetivas: meio e modo."

    fundamento: "Art. 121, §3º (homicídio culposo) e §4º (causas de aumento) do CP. Pena base: detenção de 1 a 3 anos.",
    conceito: "Causas de aumento (§4º): inobservância de regra técnica de profissão ou arte; omissão de socorro; fuga para evitar responsabilidade; acidente de trânsito por embriaguez — aumento de 1/3. Culpa consciente: agente prevê o resultado mas acredita sinceramente que não ocorrerá. Dolo eventual: agente prevê o resultado e assume o risco de produzi-lo (aceita como possível).",

    dica: "Fórmula: Culpa consciente = 'previu mas confiou que não aconteceria'. Dolo eventual = 'previu, não se importou e assumiu o risco'. Ambos têm previsão — o diferencial é a postura interna do agente diante do resultado."
  },

  },
  {

let filtered = [...allCards];
let cur = 0;
let activeFilter = 'all';

function setFilter(f) {
  activeFilter = f;
  cur = 0;
  filtered = f === 'all' ? [...allCards] : allCards.filter(c => c.grupo === f);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const empty = document.getElementById('empty');
  const cardScene = document.querySelector('.card-scene');

  if (filtered.length === 0) {
    empty.style.display = 'block';
    cardScene.style.display = 'none';
    document.getElementById('topic-nav').innerHTML = '';
    document.getElementById('hdr-count').textContent = '0 fichas';
    return;
  }

  empty.style.display = 'none';
  cardScene.style.display = 'block';

  const c = filtered[cur];

  document.getElementById('f-cat').className = 'f-cat ' + c.catClass;
  document.getElementById('f-cat').textContent = c.cat;
  document.getElementById('f-title').textContent = c.title;
  document.getElementById('f-question').textContent = c.question;
  document.getElementById('f-pills').innerHTML = c.pills.map(p => `<span class="pill">${p}</span>`).join('');

  document.getElementById('b-cat').className = 'f-cat ' + c.catClass;
  document.getElementById('b-cat').textContent = c.cat;
  document.getElementById('b-title').textContent = c.title;

  let html = `
    <div class="b-block"><div class="blbl">Fundamento legal</div><p>${c.fundamento}</p></div>
    <div class="b-block"><div class="blbl">Conceito e distinções</div><p>${c.conceito}</p></div>
    <div class="b-alert"><div class="blbl">Atenção — ponto de prova</div><p>${c.atencao}</p></div>
    <div class="b-tip"><div class="blbl">Dica de memorização</div><p>${c.dica}</p></div>
  `;
  document.getElementById('b-blocks').innerHTML = html;

  document.getElementById('card').classList.remove('flipped');

  const pct = ((cur + 1) / filtered.length * 100).toFixed(0);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('hdr-count').textContent = `${cur + 1} / ${filtered.length} fichas`;

  const nav = document.getElementById('topic-nav');
  const shortTitle = t => t.length > 28 ? t.substring(0, 28) + '…' : t;
  nav.innerHTML = filtered.map((x, i) =>
    `<button class="topic-btn ${i === cur ? 'active' : ''}" onclick="go(${i})">${i + 1}. ${shortTitle(x.title)}</button>`
  ).join('') + `<span class="counter-pill">${cur + 1} / ${filtered.length}</span>`;
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }
function go(i) { cur = i; render(); }
function prev() { cur = (cur - 1 + filtered.length) % filtered.length; render(); }
function next() { cur = (cur + 1) % filtered.length; render(); }

render();
</script>

</html>
