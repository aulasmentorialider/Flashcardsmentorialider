<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards | Mentoria Líder — CFO PMMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1F3864; --navy-mid: #2E5FA3; --navy-light: #dce8f8;
    --teal: #0F6E56; --teal-light: #E1F5EE;
    --coral: #993C1D; --coral-light: #FAECE7;
    --amber: #854F0B; --amber-light: #FAEEDA;
    --purple: #534AB7; --purple-light: #EEEDFE;
    --bg: #f4f6fb; --surface: #fff;
    --border: rgba(31,56,100,0.12);
    --text: #1a1f2e; --muted: #5a6580; --faint: #9ba4bc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  .logo-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.5);
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    padding: 5px 14px;
    border-radius: 4px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 1rem;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: .5rem;
  }
  header p {
    font-size: 14px;
    color: rgba(255,255,255,.55);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 680px;
    margin: 2rem auto 0;
    padding: 0 1.5rem;
  }
  .search-input {
    width: 100%;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    padding: 11px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--navy-mid); }
  .search-input::placeholder { color: var(--faint); }

  /* FILTER TABS */
  .filter-bar {
    max-width: 680px;
    margin: 1rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--navy-mid); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* GRID */
  main {
    max-width: 680px;
    margin: 2rem auto 4rem;
    padding: 0 1.5rem;
  }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: .75rem;
    margin-top: 1.75rem;
  }
  .grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.4rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover {
    border-color: var(--navy-mid);
    box-shadow: 0 2px 12px rgba(31,56,100,.08);
  }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  .arrow {
    font-size: 16px;
    color: var(--faint);
  }
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--faint);
    font-size: 14px;
    display: none;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 11px;
    color: var(--faint);
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: .05em;
  }

  @media (max-width: 540px) {
    header { padding: 2rem 1rem 1.5rem; }
    header h1 { font-size: 22px; }
    main, .search-wrap, .filter-bar { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">Mentoria Líder · CFO PMMG 2026</div>
  <h1>Flashcards de Estudo</h1>
  <p>Material exclusivo para alunos da Mentoria Líder. Acesse as fichas por disciplina e estude em qualquer dispositivo.</p>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Buscar disciplina ou tema..." oninput="filterCards(this.value)" />
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('constitucional',this)">Constitucional</button>
    <button class="filter-btn" onclick="setFilter('penal',this)">Penal</button>
    <button class="filter-btn" onclick="setFilter('processo',this)">Processo Penal</button>
    <button class="filter-btn" onclick="setFilter('administrativo',this)">Administrativo</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">Nenhuma ficha encontrada para essa busca.</div>
</main>

<footer>Mentoria Líder · Material de uso exclusivo dos alunos · Todos os direitos reservados</footer>

<script>
const decks = [
  {
    title: 'Ações Constitucionais',
    sub: 'HC · MS · MI · HD · Ação Popular · Comparativos',
    file: 'fichas_acoes_constitucionais.html',
    icon: '⚖️',
    color: '#EEEDFE',
    tag: 'Constitucional',
    tagColor: '#534AB7',
    tagBg: '#EEEDFE',
    grupo: 'constitucional',
    fichas: 11
  },
  {
    title: 'Controle de Constitucionalidade',
    sub: 'ADI · ADC · ADPF · ADO · Modulação · SV',
    file: 'fichas_controle_constitucionalidade.html',
    icon: '🏛️',
    color: '#dce8f8',
    tag: 'Constitucional',
    tagColor: '#1F3864',
    tagBg: '#dce8f8',
    grupo: 'constitucional',
    fichas: 8
  },
  {
    title: 'Forças Armadas, Defesa e Segurança',
    sub: 'FA · Estado de Defesa · Estado de Sítio · IF · Art. 144',
    file: 'fichas_direito_constitucional_seguranca.html',
    icon: '🛡️',
    color: '#dce8f8',
    tag: 'Constitucional',
    tagColor: '#1F3864',
    tagBg: '#dce8f8',
    grupo: 'constitucional',
    fichas: 13
  },
  {
    title: 'Direito Penal — Parte Geral',
    sub: 'Princípios · Teoria do Crime · Tipicidade · Pena · Prescrição',
    file: 'fichas_direito_penal_parte_geral.html',
    icon: '📖',
    color: '#EEEDFE',
    tag: 'Direito Penal',
    tagColor: '#534AB7',
    tagBg: '#EEEDFE',
    grupo: 'penal',
    fichas: 13
  },
  {
    title: 'Direito Penal — Parte Especial',
    sub: 'Crimes contra a pessoa · Crimes contra o patrimônio',
    file: 'fichas_direito_penal_parte_especial.html',
    icon: '🔍',
    color: '#EEEDFE',
    tag: 'Direito Penal',
    tagColor: '#534AB7',
    tagBg: '#EEEDFE',
    grupo: 'penal',
    fichas: 12
  },
  {
    title: 'Notitia Criminis',
    sub: 'Inquérito Policial · Flagrante · Representação · Arquivamento',
    file: 'fichas_notitia_criminis.html',
    icon: '🗂️',
    color: '#FAECE7',
    tag: 'Processo Penal',
    tagColor: '#993C1D',
    tagBg: '#FAECE7',
    grupo: 'processo',
    fichas: 10
  },
  {
    title: 'Direito Administrativo',
    sub: 'Princípios · Ato Adm. · Licitação · Servidor · Responsabilidade',
    file: 'fichas_direito_administrativo_oral.html',
    icon: '🏢',
    color: '#E1F5EE',
    tag: 'Administrativo',
    tagColor: '#0F6E56',
    tagBg: '#E1F5EE',
    grupo: 'administrativo',
    fichas: 14
  }
];

let activeFilter = 'all';

function renderGrid(items) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!items.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = items.map(d => `
    <a class="card" href="${d.file}">
      <div class="card-icon" style="background:${d.tagBg}">${d.icon}</div>
      <div class="card-body">
        <div class="card-title">${d.title}</div>
        <div class="card-sub">${d.sub}</div>
      </div>
      <div class="card-meta">
        <span class="tag" style="background:${d.tagBg};color:${d.tagColor}">${d.fichas} fichas</span>
        <span class="arrow">→</span>
      </div>
    </a>
  `).join('');
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector('.search-input').value = '';
  const filtered = f === 'all' ? decks : decks.filter(d => d.grupo === f);
  renderGrid(filtered);
}

function filterCards(q) {
  const term = q.toLowerCase().trim();
  const base = activeFilter === 'all' ? decks : decks.filter(d => d.grupo === activeFilter);
  if (!term) { renderGrid(base); return; }
  renderGrid(base.filter(d =>
    d.title.toLowerCase().includes(term) || d.sub.toLowerCase().includes(term)
  ));
}

renderGrid(decks);
</script>
</body>
</html>
